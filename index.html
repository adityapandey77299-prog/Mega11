<!DOCTYPE html>
<html>
<head>
  <title>Mega11 Fantasy</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111827;
      color: white;
    }

    .header {
      background: #ff6b00;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: white;
    }

    .match {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      color: black;
    }

    .teams {
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .prize {
      color: #ff6b00;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #ff6b00;
      border: none;
      color: white;
      border-radius: 8px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="header">🏏 Mega11 Fantasy</div>

  <div class="match">
    <div class="teams">RCB vs MI</div>
    <div>Entry: ₹49</div>
    <div class="prize">Win: ₹5000</div>
    <button onclick="join()">Join Contest</button>
  </div>

  <script>
    function join() {
      window.location.href = "join.html";
    }
  </script>

</body>
</html>
