
<!DOCTYPE html>
<html>
<head>
  <title>Mega11 Fantasy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff6b00, #ffffff);
    }

    .header {
      background: rgba(255, 107, 0, 0.9);
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .container {
      padding: 15px;
    }

    .match {
      background: white;
      margin: 15px 0;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .teams {
      font-size: 20px;
      font-weight: bold;
      color: #111;
    }

    .info {
      margin-top: 8px;
      color: #444;
    }

    .prize {
      color: #ff6b00;
      font-weight: bold;
    }

    button {
      margin-top: 12px;
      padding: 12px;
      width: 100%;
      background: linear-gradient(to right, #ff6b00, #ff8c42);
      border: none;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="header">🏏 Mega11 Fantasy</div>

  <div class="container">

    <div class="match">
      <div class="teams">RCB vs MI</div>
      <div class="info">Entry: ₹49</div>
      <div class="prize">Win ₹5000</div>
      <button onclick="join()">Join Contest</button>
    </div>

    <div class="match">
      <div class="teams">CSK vs KKR</div>
      <div class="info">Entry: ₹99</div>
      <div class="prize">Win ₹10000</div>
      <button onclick="join()">Join Contest</button>
    </div>

  </div>

  <script>
    function join() {
      window.location.href = "team.html";
    }
  </script>

</body><div class="navbar">
  <button onclick="home()">🏠 Home</button>
  <button onclick="team()">➕ Team</button>
  <button onclick="my()">👥 My Team</button>
  <button onclick="wallet()">💰 Wallet</button>
  <button onclick="profile()">👤 Profile</button>
</div>
</html>
