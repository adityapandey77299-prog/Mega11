
<!DOCTYPE html>
<html>
<head>
  <title>Mega11 Fantasy</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .header {
      background: #22c55e;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .match {
      background: #1e293b;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    .teams {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .prize {
      color: #22c55e;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 8px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="header">🏏 Mega11 Fantasy</div>

  <div class="match">
    <div class="teams">RCB vs MI</div>
    <div>Entry: ₹49</div>
    <div class="prize">Win: ₹5000</div>
    <button onclick="join()">Join Contest</button>
  </div>

  <div class="match">
    <div class="teams">CSK vs KKR</div>
    <div>Entry: ₹99</div>
    <div class="prize">Win: ₹10000</div>
    <button onclick="join()">Join Contest</button>
  </div>

  <div class="match">
    <div class="teams">IND vs AUS</div>
    <div>Entry: ₹199</div>
    <div class="prize">Win: ₹25000</div>
    <button onclick="join()">Join Contest</button>
  </div>

  <script>
    function join() {
      alert("Contest Joined 💰");
    }
  </script>

</body>
</html>
