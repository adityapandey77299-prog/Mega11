
<!DOCTYPE html>
<html>
<head>
  <title>Mega11 Fantasy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111827;
      color: white;
    }

    .header {
      background: #ff6b00;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .banner {
      background: linear-gradient(to right, #ff6b00, white);
      color: black;
      padding: 20px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 10px;
    }

    .match {
      background: white;
      color: black;
      margin: 15px 0;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .teams {
      font-size: 20px;
      font-weight: bold;
    }

    .details {
      margin-top: 8px;
      font-size: 14px;
    }

    .prize {
      color: #ff6b00;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      background: #ff6b00;
      border: none;
      color: white;
      border-radius: 10px;
      font-size: 16px;
    }

    button:hover {
      background: #e65c00;
    }
  </style>
</head>

<body>

  <div class="header">🏏 Mega11 Fantasy</div>

  <div class="banner">
    🇮🇳 Play Fantasy Cricket & Win Real Cash 💰
  </div>

  <div class="container">

    <div class="match">
      <div class="teams">RCB vs MI</div>
      <div class="details">Entry: ₹49</div>
      <div class="prize">Win ₹5000</div>
      <button onclick="join()">Join Contest</button>
    </div>

    <div class="match">
      <div class="teams">CSK vs KKR</div>
      <div class="details">Entry: ₹99</div>
      <div class="prize">Win ₹10000</div>
      <button onclick="join()">Join Contest</button>
    </div>

    <div class="match">
      <div class="teams">IND vs AUS</div>
      <div class="details">Entry: ₹199</div>
      <div class="prize">Win ₹25000</div>
      <button onclick="join()">Join Contest</button>
    </div>

  </div>

  <script>
    function join() {
      window.location.href = "join.html";
    }
  </script>

</body>
</html>
