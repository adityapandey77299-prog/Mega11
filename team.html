<!DOCTYPE html>
<html>
<head>
  <title>Create Team</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111827;
      color: white;
    }

    .header {
      background: #ff6b00;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .player {
      display: flex;
      justify-content: space-between;
      background: white;
      color: black;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      background: #ff6b00;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #ff6b00;
      text-align: center;
      padding: 10px;
    }
  </style>

</head>

<body>

  <div class="header">🏏 Select Your Team</div>

  <div class="player">
    Virat Kohli (BAT)
    <button onclick="select()">+</button>
  </div>

  <div class="player">
    Rohit Sharma (BAT)
    <button onclick="select()">+</button>
  </div>

  <div class="player">
    MS Dhoni (WK)
    <button onclick="select()">+</button>
  </div>

  <div class="player">
    Hardik Pandya (AR)
    <button onclick="select()">+</button>
  </div>

  <div class="player">
    Bumrah (BOWL)
    <button onclick="select()">+</button>
  </div>

  <div class="footer">
    <button onclick="createTeam()">Create Team</button>
  </div>

  <script>
    function select() {
      alert("Player Selected ✅");
    }

    function createTeam() {
      alert("Team Created 🎉");
    }
  </script>

</body>
</html>
